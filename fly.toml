# fly.toml — Fly.io Sprites deployment for AlphaClaw + Kumo
# Sprites are persistent Linux microVMs with auto-sleep.
# Full VM means iptables works natively for Tier 2 egress enforcement.
#
# Deploy: fly launch (from this directory)
# Secrets: fly secrets set SETUP_PASSWORD=... ANTHROPIC_API_KEY=...

app = "alphaclaw-kumo"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "alphaclaw_data"
  destination = "/data"

[env]
  KUMO_MODE = "observe"
  KUMO_ENABLED = "true"
  ALPHACLAW_ROOT_DIR = "/data"
  TRUST_PROXY_HOPS = "1"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[checks]
  [checks.alphaclaw]
    port = 3000
    type = "http"
    method = "GET"
    path = "/api/status"
    interval = "30s"
    timeout = "5s"

  [checks.kumo]
    port = 9091
    type = "http"
    method = "GET"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
